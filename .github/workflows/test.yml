name: CI
# Local runner (macOS uses OrbStack — https://orbstack.dev):
# Install act (https://github.com/nektos/act) then run:
#   act push                  # full CI
#   act push -j lint          # single job
#   act push -j test          # skip compose-demo (needs Docker-in-Docker)
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff==0.15.7
      - run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # dagster/ imports the PyPI dagster package; install so mypy does not
      # treat the local dagster/ folder as the module.
      - run: pip install -r requirements.txt -r requirements-dagster.txt
      - run: mypy ingestion/ transformations/ ml/ scripts/ dagster/

  test:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short --ignore=tests/integration --cov=ingestion --cov=transformations --cov=ml --cov-report=term-missing --cov-fail-under=70

  compose-demo:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Start core stack and run pipeline
        run: |
          make up
          make pipeline
      - name: Show container logs on failure
        if: failure()
        run: |
          docker ps -a
          docker logs --tail 200 sds-postgres || true
          docker logs --tail 200 sds-seaweedfs || true
          docker logs --tail 200 sds-hive-metastore || true
          docker logs --tail 200 sds-trino || true
          docker logs --tail 200 sds-dagster-webserver || true
          docker logs --tail 200 sds-dagster-daemon || true
          docker logs --tail 200 sds-mlflow || true
      - name: Stop stack
        if: always()
        run: make down
