services:
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: sds-seaweedfs
    command: server -s3 -s3.port=8333 -master.port=9333 -volume.port=9334
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - ./data/seaweedfs:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8333/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: pgvector/pgvector:pg17
    container_name: sds-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ../config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  hive-metastore:
    build: ./hive-metastore
    container_name: sds-hive-metastore
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-solodshouse}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-solodshouse123}
      DATA_BUCKET: ${DATA_BUCKET:-solodshouse-data}
      WAREHOUSE_URI: ${WAREHOUSE_URI:-s3a://solodshouse-data/warehouse/}
    ports:
      - "9083:9083"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'status' | nc -w 2 localhost 9083 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  trino:
    image: trinodb/trino:480
    container_name: sds-trino
    user: "0"
    depends_on:
      hive-metastore:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-solodshouse}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-solodshouse123}
    ports:
      - "8080:8080"
    volumes:
      - ../config/trino/config.properties:/etc/trino/config.properties:ro
      - ../config/trino/catalog:/etc/trino/catalog-template:ro
      - ../scripts/trino-entrypoint.sh:/usr/local/bin/trino-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/trino-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  mlflow:
    build: ./mlflow
    container_name: sds-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://seaweedfs:8333
      DATA_BUCKET: ${DATA_BUCKET:-solodshouse-data}
      MLFLOW_ARTIFACT_BUCKET: ${MLFLOW_ARTIFACT_BUCKET:-solodshouse-mlflow}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT:-}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-solodshouse}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-solodshouse123}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  dagster-webserver:
    build:
      context: ..
      dockerfile: docker/dagster/Dockerfile
    container_name: sds-dagster-webserver
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      trino:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      HIVE_METASTORE_URI: thrift://hive-metastore:9083
      PRODUCT_ID: ${PRODUCT_ID:-solodshouse}
      PRODUCT_DISPLAY_NAME: ${PRODUCT_DISPLAY_NAME:-SoloDShouse}
      PRODUCT_DOMAIN: ${PRODUCT_DOMAIN:-energy_ai_cost}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      RUNTIME_VERSION: ${RUNTIME_VERSION:-sds-v0.1.0}
      OBJECT_STORE_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-solodshouse}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-solodshouse123}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://seaweedfs:8333
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-solodshouse}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-solodshouse123}
      DATA_BUCKET: ${DATA_BUCKET:-solodshouse-data}
      AUDIT_BUCKET: ${AUDIT_BUCKET:-}
      MLFLOW_ARTIFACT_BUCKET: ${MLFLOW_ARTIFACT_BUCKET:-solodshouse-mlflow}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT:-}
      WAREHOUSE_URI: ${WAREHOUSE_URI:-s3a://solodshouse-data/warehouse/}
      TRINO_USER: ${TRINO_USER:-solodshouse}
      TRINO_URL: http://trino:8080
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DAGSTER_HOME: /app/dagster
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/app/dagster/workspace.yaml"]
    ports:
      - "3000:3000"
    volumes:
      - ./data/dagster:/app/dagster/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/server_info"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  dagster-daemon:
    build:
      context: ..
      dockerfile: docker/dagster/Dockerfile
    container_name: sds-dagster-daemon
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      trino:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      dagster-webserver:
        condition: service_healthy
    environment:
      HIVE_METASTORE_URI: thrift://hive-metastore:9083
      PRODUCT_ID: ${PRODUCT_ID:-solodshouse}
      PRODUCT_DISPLAY_NAME: ${PRODUCT_DISPLAY_NAME:-SoloDShouse}
      PRODUCT_DOMAIN: ${PRODUCT_DOMAIN:-energy_ai_cost}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      RUNTIME_VERSION: ${RUNTIME_VERSION:-sds-v0.1.0}
      OBJECT_STORE_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-solodshouse}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-solodshouse123}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://seaweedfs:8333
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-solodshouse}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-solodshouse123}
      DATA_BUCKET: ${DATA_BUCKET:-solodshouse-data}
      AUDIT_BUCKET: ${AUDIT_BUCKET:-}
      MLFLOW_ARTIFACT_BUCKET: ${MLFLOW_ARTIFACT_BUCKET:-solodshouse-mlflow}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT:-}
      WAREHOUSE_URI: ${WAREHOUSE_URI:-s3a://solodshouse-data/warehouse/}
      TRINO_USER: ${TRINO_USER:-solodshouse}
      TRINO_URL: http://trino:8080
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DAGSTER_HOME: /app/dagster
    command: ["dagster-daemon", "run", "-w", "/app/dagster/workspace.yaml"]
    volumes:
      - ./data/dagster:/app/dagster/storage
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; os.kill(1, 0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
