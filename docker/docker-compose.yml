services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: slh-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: slh-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init-minio.sh"]
    volumes:
      - ../scripts/init-minio.sh:/init-minio.sh:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      DATA_BUCKET: ${DATA_BUCKET:-}
      BUCKET_NAME: ${BUCKET_NAME:-sololakehouse}
      AUDIT_BUCKET: ${AUDIT_BUCKET:-}
      MLFLOW_ARTIFACT_BUCKET: ${MLFLOW_ARTIFACT_BUCKET:-}
    restart: "no"

  postgres:
    image: postgres:17
    container_name: slh-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ../config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  hive-metastore:
    build: ./hive-metastore
    container_name: slh-hive-metastore
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      DATA_BUCKET: ${DATA_BUCKET:-}
      BUCKET_NAME: ${BUCKET_NAME:-sololakehouse}
      WAREHOUSE_URI: ${WAREHOUSE_URI:-}
    ports:
      - "9083:9083"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'status' | nc -w 2 localhost 9083 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  trino:
    image: trinodb/trino:480
    container_name: slh-trino
    user: "0"
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ../config/trino/config.properties:/etc/trino/config.properties:ro
      - ../config/trino/catalog:/etc/trino/catalog-template:ro
      - ../scripts/trino-entrypoint.sh:/usr/local/bin/trino-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/trino-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  mlflow:
    build: ./mlflow
    container_name: slh-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      DATA_BUCKET: ${DATA_BUCKET:-}
      BUCKET_NAME: ${BUCKET_NAME:-sololakehouse}
      MLFLOW_ARTIFACT_BUCKET: ${MLFLOW_ARTIFACT_BUCKET:-}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT:-}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  dagster-webserver:
    build:
      context: ..
      dockerfile: docker/dagster/Dockerfile
    container_name: slh-dagster-webserver
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      trino:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      HIVE_METASTORE_URI: thrift://hive-metastore:9083
      PRODUCT_ID: ${PRODUCT_ID:-sololakehouse}
      PRODUCT_DISPLAY_NAME: ${PRODUCT_DISPLAY_NAME:-SoloLakehouse}
      PRODUCT_DOMAIN: ${PRODUCT_DOMAIN:-financial_markets}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      RUNTIME_VERSION: ${RUNTIME_VERSION:-slh-v2.5.1}
      MINIO_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      DATA_BUCKET: ${DATA_BUCKET:-}
      BUCKET_NAME: ${BUCKET_NAME:-sololakehouse}
      AUDIT_BUCKET: ${AUDIT_BUCKET:-}
      MLFLOW_ARTIFACT_BUCKET: ${MLFLOW_ARTIFACT_BUCKET:-}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT:-}
      WAREHOUSE_URI: ${WAREHOUSE_URI:-}
      TRINO_USER: ${TRINO_USER:-}
      TRINO_URL: http://trino:8080
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DAGSTER_HOME: /app/dagster
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/app/dagster/workspace.yaml"]
    ports:
      - "3000:3000"
    volumes:
      - ./data/dagster:/app/dagster/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/server_info"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  dagster-daemon:
    build:
      context: ..
      dockerfile: docker/dagster/Dockerfile
    container_name: slh-dagster-daemon
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      trino:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      dagster-webserver:
        condition: service_healthy
    environment:
      HIVE_METASTORE_URI: thrift://hive-metastore:9083
      PRODUCT_ID: ${PRODUCT_ID:-sololakehouse}
      PRODUCT_DISPLAY_NAME: ${PRODUCT_DISPLAY_NAME:-SoloLakehouse}
      PRODUCT_DOMAIN: ${PRODUCT_DOMAIN:-financial_markets}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      RUNTIME_VERSION: ${RUNTIME_VERSION:-slh-v2.5.1}
      MINIO_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      DATA_BUCKET: ${DATA_BUCKET:-}
      BUCKET_NAME: ${BUCKET_NAME:-sololakehouse}
      AUDIT_BUCKET: ${AUDIT_BUCKET:-}
      MLFLOW_ARTIFACT_BUCKET: ${MLFLOW_ARTIFACT_BUCKET:-}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT:-}
      WAREHOUSE_URI: ${WAREHOUSE_URI:-}
      TRINO_USER: ${TRINO_USER:-}
      TRINO_URL: http://trino:8080
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DAGSTER_HOME: /app/dagster
    command: ["dagster-daemon", "run", "-w", "/app/dagster/workspace.yaml"]
    volumes:
      - ./data/dagster:/app/dagster/storage
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; os.kill(1, 0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
