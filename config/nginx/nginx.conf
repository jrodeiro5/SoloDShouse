worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 8090;
        server_name localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
        }

        location /dagster    { proxy_pass http://host.docker.internal:3000; proxy_set_header Host $host; }
        location /openwebui   { proxy_pass http://host.docker.internal:3001; proxy_set_header Host $host; }
        location /evidence    { proxy_pass http://host.docker.internal:3002; proxy_set_header Host $host; }
        location /langfuse    { proxy_pass http://host.docker.internal:3003; proxy_set_header Host $host; }
        location /litellm     { proxy_pass http://host.docker.internal:4000; proxy_set_header Host $host; }
        location /mlflow      { proxy_pass http://host.docker.internal:5000; proxy_set_header Host $host; }
        location /trino       { proxy_pass http://host.docker.internal:8080; proxy_set_header Host $host; }
        location /seaweedfs   { proxy_pass http://host.docker.internal:9333; proxy_set_header Host $host; }
    }
}
