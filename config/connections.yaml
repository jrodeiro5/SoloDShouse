# SoloDShouse Connection Registry (SDS-044)
#
# Add your data source connections here. dlt auto-discovers schemas
# and the collector registry picks them up — no code changes needed.
#
# Supported types: postgres | s3 | rest | filesystem
# Secrets: use vault:// prefix (encrypted by FernetVault) or ${ENV_VAR}
#
# ── Example entries ────────────────────────────────────────────────
#
# connections:
#   - name: my_postgres_db
#     type: postgres
#     roles: [reader, admin]
#     host: ${MY_PG_HOST}
#     port: 5432
#     database: analytics
#     user: reader
#     password: vault://gAAAAABn...
#     schema: public
#     table: sales_orders
#
#   - name: my_s3_bucket
#     type: s3
#     roles: [reader]
#     endpoint: ${S3_ENDPOINT}
#     bucket: raw-data
#     access_key: ${S3_ACCESS_KEY}
#     secret_key: vault://gAAAAABn...
#     prefix: my-dataset/
#     file_glob: "*.parquet"
#
#   - name: my_rest_api
#     type: rest
#     roles: [reader]
#     base_url: https://api.example.com
#     endpoint: v2/data
#     method: GET
#     headers:
#       Authorization: "Bearer ${API_TOKEN}"
#
#   - name: my_filesystem
#     type: filesystem
#     roles: [reader]
#     path: ./data/csv-exports
#     file_glob: "*.csv"

connections: []
